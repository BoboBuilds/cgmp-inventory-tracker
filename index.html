<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cGMP Inventory Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;
  --surface:#ffffff;
  --surface2:#f8f9fa;
  --border:#e2e5eb;
  --border2:#d0d5de;
  --text:#1a1d23;
  --muted:#6b7385;
  --hint:#9ba3b2;
  --green:#1a9e6e;
  --green-bg:#eef8f4;
  --green-border:#b3e0d0;
  --amber:#d97706;
  --amber-bg:#fffbeb;
  --amber-border:#fcd34d;
  --red:#dc2626;
  --red-bg:#fef2f2;
  --red-border:#fca5a5;
  --blue:#2563eb;
  --blue-bg:#eff6ff;
  --blue-border:#bfdbfe;
  --sidebar-w:190px;
  --radius:8px;
  --radius-sm:5px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f1117;--surface:#181c24;--surface2:#1e232e;--border:#272d3a;--border2:#323a4a;
    --text:#e8eaf0;--muted:#8892a4;--hint:#555f72;
    --green:#22c98a;--green-bg:#0a2419;--green-border:#1a5c42;
    --amber:#fbbf24;--amber-bg:#211a06;--amber-border:#78540a;
    --red:#f87171;--red-bg:#200d0d;--red-border:#7c2d2d;
    --blue:#60a5fa;--blue-bg:#0d1829;--blue-border:#1e3a6e;
  }
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.mono{font-family:'DM Mono',monospace;font-size:12px}

/* Layout */
.app{display:flex;height:calc(100vh - 34px);height:calc(100dvh - 34px);overflow:hidden}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;color:var(--text)}
.content{flex:1;overflow-y:auto;padding:18px 20px;background:var(--bg)}

/* Sidebar */
.logo{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.logo-name{font-size:14px;font-weight:600;color:var(--text)}
.logo-tag{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:2px}
.nav-section{padding:8px 0}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-left:2px solid transparent;transition:all 0.12s}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--green);background:var(--green-bg);border-left-color:var(--green)}
.nav-item svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.5}
.nav-divider{height:1px;background:var(--border);margin:4px 16px}

/* Views */
.view{display:none}.view.active{display:block}

/* Stats grid */
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.stat-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
.stat-val{font-size:24px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text)}
.stat-card.ok .stat-val{color:var(--green)}
.stat-card.warn .stat-val{color:var(--amber)}
.stat-card.danger .stat-val{color:var(--red)}

/* Alerts */
.alert{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:6px;border:1px solid}
.alert.ok{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.alert.warn{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.alert.danger{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.alert strong{font-weight:600}

/* Cards / Tables */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.card-pad{padding:18px}
.card-title{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:8px 11px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}
td{padding:8px 11px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sec-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px;margin-top:18px}
.sec-lbl:first-child{margin-top:0}

/* Badges */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;white-space:nowrap}
.bdg.ok{background:var(--green-bg);color:var(--green)}
.bdg.warn{background:var(--amber-bg);color:var(--amber)}
.bdg.danger{background:var(--red-bg);color:var(--red)}
.bdg.info{background:var(--blue-bg);color:var(--blue)}
.bdg.neutral{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:inherit;transition:all .12s}
.btn:hover{background:var(--surface2);border-color:var(--border2)}
.btn.pri{background:var(--green);color:#fff;border-color:var(--green)}
.btn.pri:hover{opacity:.88}
.btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn.sm{padding:4px 10px;font-size:11.5px}
.btn.xs{padding:3px 8px;font-size:11px}

/* Search row */
.srow{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.sinput{flex:1;min-width:180px;padding:7px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;outline:none}
.sinput:focus{border-color:var(--green)}
select.sinput{max-width:160px;cursor:pointer}
.count-lbl{font-size:11.5px;color:var(--muted);margin-bottom:10px}

/* Forms */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.full{grid-column:1/-1}
.flbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.flbl .req{color:var(--red)}
.fi{padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;outline:none;width:100%}
.fi:focus{border-color:var(--green)}
.faction{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}

/* Info box */
.infobox{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:11px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;margin-bottom:0}
.infobox .lbl{color:var(--muted);font-size:11px}
.infobox .val{font-weight:500;color:var(--text)}

/* Import */
.drop-zone{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface2)}
.drop-zone:hover,.drop-zone.drag{border-color:var(--green);background:var(--green-bg)}
.imp-ta{width:100%;height:110px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:9px;resize:vertical;outline:none}
.imp-ta:focus{border-color:var(--green)}
.prog-bar-bg{background:var(--surface2);border-radius:99px;height:5px;overflow:hidden;margin-top:10px}
.prog-bar{height:5px;border-radius:99px;background:var(--green);width:0%;transition:width .4s}
.txn-r{color:var(--green);font-family:'DM Mono',monospace;font-size:11px;font-weight:500}
.txn-d{color:var(--red);font-family:'DM Mono',monospace;font-size:11px;font-weight:500}
.txn-a{color:var(--amber);font-family:'DM Mono',monospace;font-size:11px;font-weight:500}
.chip{display:inline-block;padding:1px 7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}

/* Lot detail modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);max-width:480px;width:100%;max-height:80vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border)}
.modal-title{font-size:14px;font-weight:600}
.modal-body{padding:16px 18px}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ===== MOBILE ===== */
.bottom-nav{display:none}
.hamburger{display:none}

@media(max-width:700px){
  /* Fix iOS 100vh viewport bug */
  .app{height:100dvh;height:100vh;flex-direction:column}

  /* Hide desktop sidebar */
  .sidebar{display:none}

  /* Show bottom nav */
  .bottom-nav{
    display:flex;
    position:fixed;bottom:0;left:0;right:0;
    background:var(--surface);
    border-top:1px solid var(--border);
    z-index:100;
    padding:6px 0 env(safe-area-inset-bottom, 6px);
  }
  .bn-item{
    flex:1;display:flex;flex-direction:column;align-items:center;
    gap:3px;padding:5px 2px;cursor:pointer;
    font-size:9px;font-weight:500;color:var(--muted);
    border:none;background:none;font-family:inherit;
    -webkit-tap-highlight-color:transparent;
  }
  .bn-item.active{color:var(--green)}
  .bn-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5}
  .bn-badge{
    position:absolute;top:4px;right:calc(50% - 18px);
    background:var(--red);color:#fff;
    font-size:9px;font-weight:600;padding:1px 4px;
    border-radius:99px;min-width:14px;text-align:center;
    display:none;
  }
  .bn-item-wrap{position:relative}

  /* Topbar adjustments */
  .topbar{padding:10px 14px}
  .topbar-title{font-size:14px}

  /* Main content padding — leave room for bottom nav */
  .content{
    padding:12px 14px 80px;
    -webkit-overflow-scrolling:touch;
  }

  /* Stats: 2 columns on mobile */
  .stats{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-card{padding:10px 12px}
  .stat-val{font-size:20px}

  /* Two-col and form grids: single column */
  .two-col{grid-template-columns:1fr}
  .fgrid{grid-template-columns:1fr}
  .fg.full{grid-column:1}

  /* Tables: horizontal scroll */
  .card{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:580px}

  /* Search row: wrap */
  .srow{flex-wrap:wrap}
  .sinput{min-width:0;flex:1 1 120px}

  /* Modal: full screen on mobile */
  .modal-bg{padding:0;align-items:flex-end}
  .modal{border-radius:var(--radius) var(--radius) 0 0;max-height:90dvh;max-height:90vh;width:100%}

  /* Alerts: smaller text */
  .alert{font-size:12px}

  /* Buttons: easier tap targets */
  .btn{padding:8px 14px}
  .btn.xs,.btn.sm{padding:6px 10px}

  /* Import textarea */
  .imp-ta{height:80px}

  /* Hamburger button in topbar */
  .hamburger{display:flex;align-items:center;justify-content:center;width:36px;height:36px;
    border:none;background:none;cursor:pointer;color:var(--text);border-radius:var(--radius-sm);
    -webkit-tap-highlight-color:transparent;}
  .hamburger:active{background:var(--surface2)}
  .hamburger svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2}

  /* Drawer overlay */
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
    opacity:0;pointer-events:none;transition:opacity .25s}
  .drawer-overlay.open{opacity:1;pointer-events:all}

  /* Slide-in drawer panel */
  .drawer{position:fixed;top:0;left:0;bottom:0;width:72vw;max-width:280px;
    background:var(--surface);z-index:201;transform:translateX(-100%);
    transition:transform .25s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;overflow-y:auto;
    box-shadow:4px 0 24px rgba(0,0,0,.18)}
  .drawer.open{transform:translateX(0)}
  .drawer-logo{padding:20px 18px 12px;border-bottom:1px solid var(--border)}
  .drawer-logo-name{font-size:15px;font-weight:600;color:var(--text)}
  .drawer-logo-tag{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:2px}
  .drawer-nav{padding:8px 0;flex:1}
  .drawer-item{display:flex;align-items:center;gap:12px;padding:12px 18px;
    cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);
    border-left:3px solid transparent;-webkit-tap-highlight-color:transparent;
    border:none;background:none;width:100%;text-align:left;font-family:inherit}
  .drawer-item:active{background:var(--surface2)}
  .drawer-item.active{color:var(--green);background:var(--green-bg);border-left:3px solid var(--green)}
  .drawer-item svg{width:18px;height:18px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.5}
  .drawer-divider{height:1px;background:var(--border);margin:4px 18px}
  .drawer-badge{margin-left:auto;background:var(--red);color:#fff;
    font-size:10px;font-weight:600;padding:2px 6px;border-radius:99px;
    font-family:'DM Mono',monospace}
}
</style>

<div id="app-switcher" style="background:#111827;color:#fff;padding:7px 20px;display:flex;align-items:center;gap:16px;font-size:12px;font-family:'DM Sans',sans-serif;flex-shrink:0">

(function(){
  var path = window.location.pathname;
  var isMaint = path.includes('maintenance');

})();

// ===================== STORAGE =====================
function loadData() {
  // Load from localStorage immediately (fast, offline fallback)
  try {
    const sl = localStorage.getItem('cgmp_lots');
    const st = localStorage.getItem('cgmp_txns');
    lots = sl ? JSON.parse(sl) : DEFAULT_LOTS.map(l => ({...l}));
    txns = st ? JSON.parse(st) : [];
    if (!sl) {
      // First run — save defaults to localStorage
      try { localStorage.setItem('cgmp_lots', JSON.stringify(lots)); } catch(e) {}
    }
  } catch(e) {
    lots = DEFAULT_LOTS.map(l => ({...l}));
    txns = [];
  }
  renderView(curView);
  updateTopbarCount();

  // Then hook up Firestore realtime listeners
  function initFirestore() {
    if (!window.__db) return;
    const db = window.__db;
    showSyncStatus('connecting');

    // Listen to lots collection
    window.__onSnapshot(window.__col(db, 'lots'), function(snap) {
      if (snap.empty) {
        // Firestore has no data yet — prompt to upload
        showSyncStatus('empty');
        return;
      }
      lots = snap.docs.map(function(d) { return d.data(); });
      try { localStorage.setItem('cgmp_lots', JSON.stringify(lots)); } catch(e) {}
      renderView(curView);
      updateTopbarCount();
      showSyncStatus('synced');
    }, function(err) {
      console.error('Lots listener error', err);
      showSyncStatus('error');
    });

    // Listen to transactions collection
    window.__onSnapshot(window.__col(db, 'transactions'), function(snap) {
      txns = snap.docs.map(function(d) { return d.data(); })
                .sort(function(a,b) { return b.date.localeCompare(a.date); });
      try { localStorage.setItem('cgmp_txns', JSON.stringify(txns)); } catch(e) {}
    }, function(err) {
      console.error('Txn listener error', err);
    });
  }

  if (window.__firebaseReady) {
    initFirestore();
  } else {
    window.addEventListener('firebase-ready', initFirestore);
    // If Firebase never loads, show offline indicator after 5s
    setTimeout(function() {
      if (!window.__firebaseReady) showSyncStatus('offline');
    }, 5000);
  }
}

// Track which lot IDs need syncing to Firestore
var _dirtyLots = new Set();
function markDirty(lotId) { _dirtyLots.add(lotId); }

function saveData() {
  // Always keep localStorage as offline fallback
  try {
    localStorage.setItem('cgmp_lots', JSON.stringify(lots));
    localStorage.setItem('cgmp_txns', JSON.stringify(txns));
  } catch(e) {}

  if (!window.__db) return;
  var db = window.__db;

  // Only write the specific lots that changed (avoids 500-doc batch limit)
  if (_dirtyLots.size > 0) {
    var toSync = Array.from(_dirtyLots);
    var batch = window.__writeBatch(db);
    toSync.forEach(function(id) {
      var lot = lots.find(function(l){ return l.id === id; });
      if (lot) batch.set(window.__doc(window.__col(db,'lots'), id), lot);
    });
    batch.commit().then(function() {
      toSync.forEach(function(id) { _dirtyLots.delete(id); });
    }).catch(function(e){
      console.error('Firestore lot write error:', e);
    });
  }

  // Write the latest transaction individually
  if (txns.length > 0) {
    window.__setDoc(
      window.__doc(window.__col(db,'transactions'), txns[0].id),
      txns[0]
    ).catch(function(e){ console.error('Firestore txn write error:', e); });
  }
}

async function saveAllToFirestore() {
  if (!window.__db) return;
  const db = window.__db;
  try {
    showSyncStatus('uploading');
    // Upload all lots in batches of 500
    const CHUNK = 400;
    for (let i = 0; i < lots.length; i += CHUNK) {
      const batch = window.__writeBatch(db);
      lots.slice(i, i + CHUNK).forEach(function(l) {
        batch.set(window.__doc(window.__col(db,'lots'), l.id), l);
      });
      await batch.commit();
    }
    // Upload all transactions
    const tbatch = window.__writeBatch(db);
    txns.forEach(function(t) {
      tbatch.set(window.__doc(window.__col(db,'transactions'), t.id), t);
    });
    await tbatch.commit();
    showSyncStatus('synced');
    alert('✓ All ' + lots.length + ' lots and ' + txns.length + ' transactions uploaded to Firestore. All devices will now sync automatically.');
  } catch(e) {
    showSyncStatus('error');
    alert('Upload error: ' + e.message);
  }
}

// ===================== HELPERS =====================
function gid(p) { return p + '-' + Date.now().toString(36).toUpperCase(); }
function today() { return new Date().toISOString().split('T')[0]; }
function daysDiff(d) {
  if (!d || d === '?' || d === 'N/A') return null;
  const v = Math.ceil((new Date(d) - new Date()) / 86400000);
  return isNaN(v) ? null : v;
}
function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d + 'T00:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}); }
  catch { return d; }
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function bdg(t, c) { return `<span class="bdg ${c}">${esc(t)}</span>`; }
function expBadge(exp) {
  const d = daysDiff(exp);
  if (d === null) return bdg('N/A','neutral');
  if (d < 0) return bdg('Expired','danger');
  if (d <= 30) return bdg(d+'d','danger');
  if (d <= 90) return bdg(d+'d','warn');
  return bdg(d+'d','ok');
}
function coaBadge(s) {
  return s==='Received' ? bdg('CoA ✓','ok') : s==='Pending' ? bdg('CoA Pending','warn') : bdg('N/A','neutral');
}
function relBadge(s) {
  return s==='Released' ? bdg('Released','ok') : s==='Quarantine' ? bdg('Quarantine','warn') : s==='Rejected' ? bdg('Rejected','danger') : bdg(s||'?','neutral');
}
function updateTopbarCount() {
  const el = document.getElementById('topbar-count');
  if (el) el.textContent = lots.length + ' lots · ' + txns.length + ' txns';
  // Update expired badge in nav
  const expiredWithStock = lots.filter(l => { const d = daysDiff(l.exp); return d !== null && d < 0 && l.qty > 0 && !l.disposed; });
  const badge = document.getElementById('expired-badge');
  if (badge) {
    if (expiredWithStock.length > 0) {
      badge.textContent = expiredWithStock.length;
      badge.style.display = 'inline';
    } else {
      badge.style.display = 'none';
    }
  }
  // Also update mobile bottom nav badge
  const bnBadge = document.getElementById('bn-exp-badge');
  if (bnBadge) {
    if (expiredWithStock.length > 0) {
      bnBadge.textContent = expiredWithStock.length;
      bnBadge.style.display = 'block';
    } else {
      bnBadge.style.display = 'none';
    }
  }
  // Update drawer badge
  const dBadge = document.getElementById('drawer-exp-badge');
  if (dBadge) {
    if (expiredWithStock.length > 0) {
      dBadge.textContent = expiredWithStock.length;
      dBadge.style.display = 'inline';
    } else {
      dBadge.style.display = 'none';
    }
  }
}

// ===================== DASHBOARD =====================
function renderDashboard() {
  const ac = lots.filter(l => l.qty > 0);
  const exp = ac.filter(l => { const d = daysDiff(l.exp); return d !== null && d < 0; });
  const e30 = ac.filter(l => { const d = daysDiff(l.exp); return d !== null && d >= 0 && d <= 30; });
  const e90 = ac.filter(l => { const d = daysDiff(l.exp); return d !== null && d > 30 && d <= 90; });
  const qu = ac.filter(l => l.status === 'Quarantine');
  const pc = ac.filter(l => l.coa === 'Pending');
  const alerts = [
    ...exp.map(l => ({c:'danger', m:`<strong>${esc(l.product)}</strong> (Lot ${esc(l.lot)}) — Expired ${fmtDate(l.exp)}`})),
    ...e30.map(l => ({c:'warn', m:`<strong>${esc(l.product)}</strong> (Lot ${esc(l.lot)}) — Expires in ${daysDiff(l.exp)} days (${fmtDate(l.exp)})`})),
    ...qu.map(l => ({c:'warn', m:`<strong>${esc(l.product)}</strong> (Lot ${esc(l.lot)}) — Quarantine${l.notes ? ': ' + esc(l.notes) : ''}`})),
    ...pc.map(l => ({c:'warn', m:`<strong>${esc(l.product)}</strong> (Lot ${esc(l.lot)}) — CoA not yet received`})),
  ];
  return `
  <div class="stats">
    <div class="stat-card ok"><div class="stat-lbl">Active lots</div><div class="stat-val">${ac.length}</div></div>
    <div class="stat-card ${exp.length?'danger':''}"><div class="stat-lbl">Expired</div><div class="stat-val">${exp.length}</div></div>
    <div class="stat-card ${e30.length?'danger':''}"><div class="stat-lbl">Exp &lt;30d</div><div class="stat-val">${e30.length}</div></div>
    <div class="stat-card ${e90.length?'warn':''}"><div class="stat-lbl">Exp &lt;90d</div><div class="stat-val">${e90.length}</div></div>
    <div class="stat-card ${qu.length?'warn':''}"><div class="stat-lbl">Quarantine</div><div class="stat-val">${qu.length}</div></div>
    <div class="stat-card ${pc.length?'warn':''}"><div class="stat-lbl">CoA pending</div><div class="stat-val">${pc.length}</div></div>
  </div>
  <div class="sec-lbl">Compliance alerts</div>
  ${alerts.length === 0
    ? '<div class="alert ok">All active inventory within compliance — no alerts</div>'
    : alerts.slice(0, 8).map(a => `<div class="alert ${a.c}">${a.m}</div>`).join('')}
  <div class="two-col" style="margin-top:16px">
    <div>
      <div class="sec-lbl">Recent transactions</div>
      <div class="card">
        <table><thead><tr><th>Date</th><th>Type</th><th>Product</th><th>Lot</th><th>Qty</th><th>Operator</th></tr></thead>
        <tbody>${txns.slice(0,8).map(t => `<tr>
          <td class="mono">${t.date}</td>
          <td><span class="${t.type==='RECEIVE'?'txn-r':t.type==='DISPENSE'?'txn-d':'txn-a'}">${t.type}</span></td>
          <td style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.product)}</td>
          <td class="mono">${esc(t.lot)}</td>
          <td class="mono" style="color:${t.qty>=0?'var(--green)':'var(--red)'};font-weight:600">${t.qty>=0?'+':''}${t.qty}</td>
          <td style="font-size:11.5px;color:var(--muted)">${esc(t.by)}</td>
        </tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:18px">No transactions yet</td></tr>'}
        </tbody></table>
      </div>
    </div>
    <div>
      <div class="sec-lbl">Expiring within 90 days</div>
      <div class="card">
        <table><thead><tr><th>Product</th><th>Lot</th><th>Expires</th><th>Qty</th></tr></thead>
        <tbody>${[...e30,...e90].slice(0,10).map(l => `<tr>
          <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(l.product)}</td>
          <td class="mono">${esc(l.lot)}</td>
          <td>${expBadge(l.exp)}</td>
          <td class="mono">${l.qty} ${esc(l.unit)}</td>
        </tr>`).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:18px">None</td></tr>'}
        </tbody></table>
      </div>
    </div>
  </div>`;
}

  let rows = lots.filter(l => { const d = daysDiff(l.exp); return d === null || d >= 0; });
  if (invS) {
    const s = invS.toLowerCase();
    rows = rows.filter(l => (l.product||'').toLowerCase().includes(s) || (l.lot||'').toLowerCase().includes(s) || (l.vendor||'').toLowerCase().includes(s) || (l.loc||'').toLowerCase().includes(s));
  }
  if (invC !== 'All') rows = rows.filter(l => l.cat === invC);

  ${expiredCount > 0 ? `<div class="alert danger" style="margin-bottom:12px;cursor:pointer;align-items:center" onclick="setView('expired')">

    <table><thead><tr><th>Location</th><th>Product</th><th>Lot #</th><th>Vendor</th><th>Category</th><th>On hand</th><th>Expires</th><th>CoA</th><th>Status</th><th>Actions</th></tr></thead>

      rows.map(l => `<tr>

        <td style="font-weight:500;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(l.product)}">${esc(l.product)}</td>

  return `
  <div style="max-width:560px">
    <div class="card card-pad">
      <div class="card-title">Dispense / use inventory</div>
      <div class="fgrid">
        <div class="fg full"><label class="flbl">Select lot <span class="req">*</span></label>
          <select class="fi" id="d-lot" onchange="updateDispInfo()">
            <option value="">— Select a lot —</option>
            ${al.map(l=>`<option value="${l.id}"${l.id===preloadId?' selected':''}>${esc(l.product)} | ${esc(l.lot)} | ${l.qty} ${esc(l.unit)}</option>`).join('')}
          </select>
        </div>
        <div id="d-info" class="fg full" style="display:${preloadId?'block':'none'}">
          <div class="infobox" id="d-info-grid">${preloadId ? buildDispInfo(lots.find(l=>l.id===preloadId)) : ''}</div>
        </div>
        <div class="fg"><label class="flbl">Qty to remove <span class="req">*</span></label><input class="fi" id="d-qty" type="number" step="0.001" min="0.001" placeholder="e.g. 0.5"></div>
        <div class="fg"><label class="flbl">Date</label><input class="fi" id="d-date" type="date" value="${today()}"></div>
        <div class="fg"><label class="flbl">Production batch # <span class="req">*</span> <small style="font-weight:400;text-transform:none;letter-spacing:0">(cGMP)</small></label><input class="fi" id="d-batch" placeholder="e.g. BATCH-2025-042"></div>
        <div class="fg"><label class="flbl">Performed by <span class="req">*</span></label><input class="fi" id="d-by" placeholder="Operator name or ID"></div>
        <div class="fg full"><label class="flbl">Notes</label><input class="fi" id="d-notes" placeholder="e.g. MaxxLab D3K2 production run"></div>
      </div>
      <div class="faction">
        <button class="btn" onclick="setView('inventory')">Cancel</button>
        <button class="btn pri" onclick="submitDispense()">Record dispensing</button>
      </div>
    </div>
  </div>`;
}

function buildDispInfo(l) {
  if (!l) return '';
  return `<div><div class="lbl">Location</div><div class="val">${esc(l.loc)||'—'}</div></div>
  <div><div class="lbl">Expiration</div><div class="val">${fmtDate(l.exp)}</div></div>
  <div><div class="lbl">CoA</div><div class="val">${esc(l.coa)}</div></div>
  <div><div class="lbl">Release status</div><div class="val">${esc(l.status)}</div></div>
  <div><div class="lbl">On hand</div><div class="val" style="color:var(--green);font-weight:600">${l.qty} ${esc(l.unit)}</div></div>
  <div><div class="lbl">Storage</div><div class="val">${esc(l.storage)||'—'}</div></div>`;
}

function updateDispInfo() {
  const id = document.getElementById('d-lot')?.value;
  const wrap = document.getElementById('d-info');
  const grid = document.getElementById('d-info-grid');
  if (!wrap || !grid) return;
  if (!id) { wrap.style.display = 'none'; return; }
  const l = lots.find(x => x.id === id);
  if (!l) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  grid.innerHTML = buildDispInfo(l);
}

function handleFileInput(inp) {
  const f = inp.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => { document.getElementById('imp-ta').value = e.target.result; };
  r.readAsText(f);
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('imp-drop').classList.remove('drag');
  const f = e.dataTransfer.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { document.getElementById('imp-ta').value = ev.target.result; };
  r.readAsText(f);
}

function doImport() {
  const raw = document.getElementById('imp-ta').value.trim();
  const msg = document.getElementById('imp-msg');
  const bar = document.getElementById('imp-bar');
  const prog = document.getElementById('imp-prog');
  if (!raw) { msg.textContent = 'Paste JSON data first.'; return; }
  prog.style.display = 'block'; bar.style.width = '30%';
  msg.textContent = 'Parsing…';
  setTimeout(() => {
    let data;
    try { data = JSON.parse(raw); } catch(e) { msg.textContent = 'Invalid JSON: ' + e.message; bar.style.background='var(--red)'; return; }
    if (!Array.isArray(data)) { msg.textContent = 'Expected a JSON array.'; return; }
    bar.style.width = '80%';
    msg.textContent = 'Saving ' + data.length + ' lots…';
    setTimeout(() => {
      lots = data;
      data.forEach(function(l){ markDirty(l.id); });
      saveData();
      bar.style.width = '100%';
      msg.style.color = 'var(--green)';
      msg.textContent = '✓ ' + data.length + ' lots imported successfully.';
      updateTopbarCount();
      setTimeout(() => setView('inventory'), 1400);
    }, 100);
  }, 80);
}

function exportAllLotsCSV() {
  const headers = [
    'Lot ID','Location','Product','Lot #','Vendor','Category',
    'Qty Received','Qty On Hand','Unit','Weight Per Container','Weight Unit',
    'Date Received','Expiration Date','Retest Date',
    'Days Until Expiry','CoA Status','Release Status','Storage Conditions',
    'Disposed','Disposal Method','Disposed Date','Disposed By',
    'Notes'
  ];
  const rows = lots.map(l => {
    const d = daysDiff(l.exp);
    const daysLabel = d === null ? '' : d < 0 ? 'EXPIRED ('+Math.abs(d)+'d ago)' : d+'d remaining';
    return [
      l.id, l.loc||'', l.product, l.lot, l.vendor, l.cat||'',
      l.qtyRec||'', l.qty, l.unit, l.wpu||'', l.wu||'',
      l.dateRec||'', l.exp||'', l.retest||'',
      daysLabel, l.coa||'', l.status||'', l.storage||'',
      l.disposed ? 'Yes' : 'No', l.disposalMethod||'', l.disposedDate||'', l.disposedBy||'',
      l.notes||''
    ].map(v => '"' + String(v||'').replace(/"/g, '""') + '"').join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'all_lots_' + today() + '.csv';
  a.click();
}

function showSyncStatus(state) {
  var dot = document.getElementById('sync-dot');
  var lbl = document.getElementById('sync-lbl');
  if (!dot || !lbl) return;
  var states = {
    connecting: { color:'#f59e0b', text:'Connecting…' },
    synced:     { color:'#1a9e6e', text:'Synced' },
    uploading:  { color:'#2563eb', text:'Uploading…' },
    empty:      { color:'#6b7385', text:'Idle' },
    error:      { color:'#dc2626', text:'Sync error' },
    offline:    { color:'#6b7385', text:'Offline / Local' },
  };
  var s = states[state] || states.offline;
  dot.style.background = s.color;
  lbl.textContent = s.text;

  var uploadPrompt = document.getElementById('upload-prompt');

}

function exportLots() {

// ===================== ACTIONS =====================
function submitReceive() {
  const g = id => document.getElementById(id)?.value.trim();
  const product=g('r-prod'), lot=g('r-lot'), vendor=g('r-vendor'), by=g('r-by'), dateRec=g('r-date');
  const qty = parseFloat(g('r-qty'));
  if (!product||!lot||!vendor||!by||!dateRec||isNaN(qty)||qty<=0) { alert('Please fill in all required (*) fields.'); return; }
  const nl = {
    id: gid('LOT'), loc:g('r-loc'), product, lot, vendor,
    cat:g('r-cat'), qtyRec:qty, qty, unit:g('r-unit')||'units',
    wpu:g('r-wpc'), wu:g('r-wu'), dateRec, exp:g('r-exp'),
    retest:g('r-retest'), coa:g('r-coa'), status:g('r-rel'),
    storage:g('r-stor'), notes:g('r-notes')
  };
  lots.unshift(nl);
  txns.unshift({ id:gid('TXN'), date:dateRec, type:'RECEIVE', product, lot, qty, batch:'', by, notes:g('r-notes')||'Lot received' });
  markDirty(nl.id);
  saveData(); updateTopbarCount(); setView('inventory');
}

function submitDispense() {
  const lid = document.getElementById('d-lot')?.value;
  const qty = parseFloat(document.getElementById('d-qty')?.value);
  const by = document.getElementById('d-by')?.value.trim();
  const batch = document.getElementById('d-batch')?.value.trim();
  const date = document.getElementById('d-date')?.value;
  const notes = document.getElementById('d-notes')?.value.trim();
  if (!lid||isNaN(qty)||qty<=0||!by||!batch) { alert('Please fill in all required (*) fields.'); return; }
  const l = lots.find(x => x.id === lid);
  if (!l) return;
  if (qty > l.qty) { alert(`Cannot remove ${qty} — only ${l.qty} ${l.unit} on hand.`); return; }
  if (l.status === 'Quarantine' && !confirm(`Lot ${l.lot} is in QUARANTINE. Confirm dispensing?`)) return;
  l.qty = Math.round((l.qty - qty) * 1000) / 1000;
  markDirty(l.id);
  txns.unshift({ id:gid('TXN'), date, type:'DISPENSE', product:l.product, lot:l.lot, qty:-qty, batch, by, notes });
  saveData(); updateTopbarCount(); setView('inventory');
}

function saveEdit(id) {
  const l = lots.find(x => x.id === id); if (!l) return;
  const oldStatus = l.status, oldCoa = l.coa, oldQty = l.qty;
  l.product = document.getElementById('e-prod').value.trim() || l.product;
  l.loc = document.getElementById('e-loc').value.trim();
  l.qty = parseFloat(document.getElementById('e-qty').value) || l.qty;
  l.coa = document.getElementById('e-coa').value;
  l.status = document.getElementById('e-status').value;
  l.exp = document.getElementById('e-exp').value;
  l.retest = document.getElementById('e-retest').value;
  l.storage = document.getElementById('e-stor').value;
  l.notes = document.getElementById('e-notes').value.trim();
  if (l.status !== oldStatus || l.coa !== oldCoa || l.qty !== oldQty) {
    txns.unshift({ id:gid('TXN'), date:today(), type:'ADJUST', product:l.product, lot:l.lot, qty:l.qty-oldQty, batch:'', by:'Manual edit', notes:`Status: ${oldStatus}→${l.status}, CoA: ${oldCoa}→${l.coa}, Qty: ${oldQty}→${l.qty}` });
  }
  markDirty(l.id);
  saveData(); updateTopbarCount(); closeModal(); renderView(curView);
}

}

function toggleExpSelectAll() {
  const boxes = document.querySelectorAll('.exp-cb');

function updateBulkBar() {

    </div>`;

}

function submitBulkDisposal() {
  const method = document.getElementById('bulk-method').value;
  const date   = document.getElementById('bulk-date').value;
  const by     = document.getElementById('bulk-by').value.trim();
  const notes  = document.getElementById('bulk-notes').value.trim();
  if (!by || !date) { alert('Performed by and date are required.'); return; }

  const ids = [...expSelected];
  let count = 0;
  ids.forEach(id => {
    const l = lots.find(x => x.id === id);
    if (!l || l.disposed) return;
    const qty = l.qty;
    l.disposed      = true;
    l.disposalMethod = method;
    l.disposedDate  = date;
    l.disposedBy    = by;
    l.disposalNotes = notes;
    l.qty           = 0;
    markDirty(l.id);
    txns.unshift({ id: gid('TXN'), date, type: 'DISPOSE', product: l.product, lot: l.lot,
      qty: -qty, batch: '', by, notes: `${method}${notes?' — '+notes:''}` });
    count++;
  });

  expSelected.clear();
  // All disposed lots already marked dirty inside the loop above — but
  // we need to re-mark since bulk closes the set before saveData
  ids.forEach(function(id){ if (lots.find(function(l){ return l.id===id && l.disposed; })) markDirty(id); });
  saveData(); updateTopbarCount(); closeModal();
  alert(`✓ ${count} lot${count!==1?'s':''} marked as disposed and logged in the audit trail.`);
  renderView('expired');
}

        const isSelected = expSelected.has(l.id);
        return `<tr style="${l.disposed?'opacity:0.6':''}${isSelected?'background:var(--amber-bg)':''}">
          <td>${!l.disposed ? `<input type="checkbox" class="exp-cb" data-id="${l.id}" ${isSelected?'checked':''} onchange="toggleExpSelect('${l.id}')">` : ''}</td>
          <td><span class="chip">${esc(l.loc)||'—'}</span></td>
          <td style="font-weight:500;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(l.product)}">${esc(l.product)}</td>
          <td class="mono">${esc(l.lot)}</td>
          <td style="color:var(--muted);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${esc(l.vendor)}</td>
          <td><span class="bdg danger">${fmtDate(l.exp)}</span><br><span style="font-size:11px;color:var(--muted)">${daysAgo}d ago</span></td>
          <td class="mono" style="color:${l.qty>0?'var(--red)':'var(--muted)'}">${l.qty} ${esc(l.unit)}</td>
          <td>${dispBadge}</td>
          <td style="font-size:12px;color:var(--muted)">${l.disposedDate ? fmtDate(l.disposedDate) + '<br><span style=\"font-size:11px\">' + esc(l.disposedBy||'') + '</span>' : '—'}</td>
          <td style="white-space:nowrap">
            ${!l.disposed ? `<button class="btn xs" onclick="openDisposalModal('${l.id}')" style="background:var(--green);color:#fff;border-color:var(--green)">Dispose</button>` : ''}
            <button class="btn xs" onclick="openEditModal('${l.id}')" style="margin-left:${l.disposed?'0':'3px'}">Edit</button>
          </td>
        </tr>`;
      }).join('')}
    </tbody></table>
  </div>`;
}

function openDisposalModal(id) {
  const l = lots.find(x => x.id === id); if (!l) return;
  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-header">
      <div class="modal-title">Record disposal — ${esc(l.lot)}</div>
      <button class="btn xs" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--red);margin-bottom:14px">
        <strong>${esc(l.product)}</strong> — Lot ${esc(l.lot)}<br>
        Expired ${fmtDate(l.exp)} · ${l.qty} ${esc(l.unit)} remaining
      </div>
      <div class="fgrid" style="gap:10px">
        <div class="fg"><label class="flbl">Disposal method <span class="req">*</span></label>
          <select class="fi" id="disp-method">
            <option>Destroyed on-site</option>
            <option>Returned to vendor</option>
            <option>Incinerated</option>
            <option>Landfill / waste disposal</option>
            <option>Composted</option>
            <option>Other</option>
          </select>
        </div>
        <div class="fg"><label class="flbl">Date of disposal <span class="req">*</span></label>
          <input class="fi" id="disp-date" type="date" value="${today()}">
        </div>
        <div class="fg"><label class="flbl">Performed by <span class="req">*</span></label>
          <input class="fi" id="disp-by" placeholder="Operator name or ID">
        </div>
        <div class="fg"><label class="flbl">Qty disposed</label>
          <input class="fi" id="disp-qty" type="number" step="0.001" value="${l.qty}" placeholder="${l.qty}">
        </div>
        <div class="fg full"><label class="flbl">Notes / disposal documentation ref</label>
          <input class="fi" id="disp-notes" placeholder="e.g. Waste manifest #, destruction cert #…">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn danger" onclick="submitDisposal('${id}')">Confirm disposal</button>
    </div>`;
  document.getElementById('modal-bg').style.display = 'flex';
}

function submitDisposal(id) {
  const l = lots.find(x => x.id === id); if (!l) return;
  const method = document.getElementById('disp-method').value;
  const date = document.getElementById('disp-date').value;
  const by = document.getElementById('disp-by').value.trim();
  const qty = parseFloat(document.getElementById('disp-qty').value) || l.qty;
  const notes = document.getElementById('disp-notes').value.trim();
  if (!by || !date) { alert('Performed by and date are required.'); return; }
  l.disposed = true;
  l.disposalMethod = method;
  l.disposedDate = date;
  l.disposedBy = by;
  l.disposalNotes = notes;
  l.qty = Math.max(0, l.qty - qty);
  markDirty(l.id);
  txns.unshift({ id: gid('TXN'), date, type: 'DISPOSE', product: l.product, lot: l.lot, qty: -qty, batch: '', by, notes: `${method}${notes ? ' — ' + notes : ''}` });
  saveData(); updateTopbarCount(); closeModal(); renderView('expired');
}

function exportAllLotsCSV() {
  const headers = ['Lot ID','Location','Product','Lot #','Vendor','Category','Qty Received','Qty On Hand','Unit','Weight Per Container','Weight Unit','Date Received','Expiration Date','Retest Date','CoA Status','Release Status','Storage','Notes','Expired'];
  const rows = lots.map(l => {
    const d = daysDiff(l.exp);
    const expired = d !== null && d < 0 ? 'Yes' : 'No';
    return [
      l.id, l.loc||'', l.product, l.lot, l.vendor||'', l.cat||'',
      l.qtyRec||'', l.qty, l.unit||'', l.wpu||'', l.wu||'',
      l.dateRec||'', l.exp||'', l.retest||'',
      l.coa||'', l.status||'', l.storage||'', l.notes||'', expired
    ].map(v => '"' + String(v||'').replace(/"/g,'""') + '"').join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'all_lots_' + today() + '.csv';
  a.click();
}

function exportExpiredCSV() {
  const all = lots.filter(l => { const d = daysDiff(l.exp); return d !== null && d < 0; });
  const headers = ['Lot ID','Product','Lot #','Vendor','Location','Expired Date','Days Ago','Qty Remaining','Unit','Disposition Status','Disposal Method','Disposed Date','Disposed By','Notes'];
  const rows = all.map(l => {
    const daysAgo = Math.abs(daysDiff(l.exp));
    return [l.id, l.product, l.lot, l.vendor, l.loc||'', l.exp, daysAgo, l.qty, l.unit,
      l.disposed?'Disposed':'Pending disposal', l.disposalMethod||'', l.disposedDate||'', l.disposedBy||'', l.disposalNotes||'']
      .map(v => '"' + String(v||'').replace(/"/g,'""') + '"').join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'expired_lots_' + today() + '.csv'; a.click();
}


// ===================== NAVIGATION =====================
const VIEW_TITLES = { dashboard:'Dashboard', inventory:'All lots', expired:'Expired lots', receive:'Receive lot', dispense:'Dispense / use', log:'Audit log', importview:'Import / export' };

function setView(v, extra) {
  curView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.bn-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.drawer-item').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v)?.classList.add('active');
  document.querySelector('.nav-item[data-view="' + v + '"]')?.classList.add('active');
  document.querySelector('.bn-item[data-view="' + v + '"]')?.classList.add('active');
  document.querySelector('.drawer-item[data-view="' + v + '"]')?.classList.add('active');
  document.getElementById('topbar-title').textContent = VIEW_TITLES[v] || v;
  renderView(v, extra);
}

function renderView(v, extra) {
  const el = document.getElementById('view-' + v); if (!el) return;
  if (v==='dashboard') el.innerHTML = renderDashboard();
  if (v==='inventory') el.innerHTML = renderInventory();
  if (v==='receive')   el.innerHTML = renderReceive();
  if (v==='dispense')  el.innerHTML = renderDispense(extra || null);
  if (v==='log')       el.innerHTML = renderLog();
  if (v==='importview') el.innerHTML = renderImport();
  if (v==='expired') el.innerHTML = renderExpired();
  // Bind filter inputs after render
  if (v==='inventory') {
    document.getElementById('inv-s')?.addEventListener('input', e => { const p = e.target.selectionStart; invS = e.target.value; renderView('inventory'); const el = document.getElementById('inv-s'); if (el) { el.focus(); el.setSelectionRange(p, p); } });
    document.getElementById('inv-c')?.addEventListener('change', e => { invC = e.target.value; renderView('inventory'); });
    document.getElementById('inv-st')?.addEventListener('change', e => { invSt = e.target.value; renderView('inventory'); });
  }
  if (v==='log') {
    document.getElementById('log-s')?.addEventListener('input', e => { const p = e.target.selectionStart; logS = e.target.value; renderView('log'); const el = document.getElementById('log-s'); if (el) { el.focus(); el.setSelectionRange(p, p); } });
    document.getElementById('log-t')?.addEventListener('change', e => { logT = e.target.value; renderView('log'); });
  }
  if (v==='expired') {
    document.getElementById('exp-s')?.addEventListener('input', e => { const p = e.target.selectionStart; expS = e.target.value; renderView('expired'); const el = document.getElementById('exp-s'); if (el) { el.focus(); el.setSelectionRange(p, p); } });
    document.getElementById('exp-disp')?.addEventListener('change', e => { expDisp = e.target.value; renderView('expired'); });
  }
}

document.getElementById('nav').addEventListener('click', e => {
  const item = e.target.closest('.nav-item');
  if (item) setView(item.dataset.view);
});

// Mobile bottom nav
var _bn = document.getElementById('bottom-nav');
if (_bn) _bn.addEventListener('click', function(e) {
  var item = e.target.closest('.bn-item');
  if (item && item.dataset.view) setView(item.dataset.view);
});

// ===================== BOOT =====================
function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Wire up drawer + swipe after full DOM is ready (drawer HTML injected after script)
window.addEventListener('DOMContentLoaded', function() {
  var drawerNav = document.getElementById('drawer-nav');
  if (drawerNav) {
    drawerNav.addEventListener('click', function(e) {
      var item = e.target.closest('.drawer-item');
      if (item && item.dataset.view) {
        setView(item.dataset.view);
        closeDrawer();
      }
    });
  }
  var drawer = document.getElementById('drawer');
  if (drawer) {
    var sx = null;
    drawer.addEventListener('touchstart', function(e) { sx = e.touches[0].clientX; }, {passive:true});
    drawer.addEventListener('touchmove', function(e) {
      if (sx === null) return;
      if (e.touches[0].clientX - sx < -40) { closeDrawer(); sx = null; }
    }, {passive:true});
  }

  loadData();
});
