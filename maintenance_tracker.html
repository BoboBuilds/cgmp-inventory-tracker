<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine Maintenance Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;--surface:#fff;--surface2:#f8f9fa;--border:#e2e5eb;--border2:#d0d5de;
  --text:#1a1d23;--muted:#6b7385;--hint:#9ba3b2;
  --green:#1a9e6e;--green-bg:#eef8f4;--green-border:#b3e0d0;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-border:#fcd34d;
  --red:#dc2626;--red-bg:#fef2f2;--red-border:#fca5a5;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-border:#bfdbfe;
  --radius:8px;--radius-sm:5px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#0f1117;--surface:#181c24;--surface2:#1e232e;--border:#272d3a;--border2:#323a4a;
    --text:#e8eaf0;--muted:#8892a4;--hint:#555f72;
    --green:#22c98a;--green-bg:#0a2419;--green-border:#1a5c42;
    --amber:#fbbf24;--amber-bg:#211a06;--amber-border:#78540a;
    --red:#f87171;--red-bg:#200d0d;--red-border:#7c2d2d;
    --blue:#60a5fa;--blue-bg:#0d1829;--blue-border:#1e3a6e;}
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.mono{font-family:'DM Mono',monospace}

/* ── Layout ── */
.app{display:flex;height:calc(100vh - 34px);height:calc(100dvh - 34px);overflow:hidden}
.sidebar{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:13px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:15px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:18px 20px;-webkit-overflow-scrolling:touch}

/* ── Sidebar ── */
.logo{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.logo-name{font-size:14px;font-weight:600}
.logo-sub{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:2px}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-left:2px solid transparent;transition:all .12s;width:100%;text-align:left;background:none;border-right:none;border-top:none;border-bottom:none;font-family:inherit}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--green);background:var(--green-bg);border-left-color:var(--green)}
.nav-item svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.5}
.nav-divider{height:1px;background:var(--border);margin:4px 16px}
.nav-section-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--hint);padding:10px 16px 4px}

/* ── Views ── */
.view{display:none}.view.active{display:block}

/* ── Cards / Tables ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.card-pad{padding:18px}
.card-title{font-size:13px;font-weight:600;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}

/* ── Badges ── */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;white-space:nowrap}
.bdg.ok{background:var(--green-bg);color:var(--green)}
.bdg.warn{background:var(--amber-bg);color:var(--amber)}
.bdg.danger{background:var(--red-bg);color:var(--red)}
.bdg.neutral{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.bdg.info{background:var(--blue-bg);color:var(--blue)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:inherit;transition:all .12s}
.btn:hover{background:var(--surface2)}
.btn.pri{background:var(--green);color:#fff;border-color:var(--green)}
.btn.pri:hover{opacity:.88}
.btn.danger{color:var(--red);border-color:var(--red-border)}
.btn.danger:hover{background:var(--red-bg)}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.xs{padding:3px 8px;font-size:11px}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.stat-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:5px}
.stat-val{font-size:22px;font-weight:600;font-family:'DM Mono',monospace}
.stat.ok .stat-val{color:var(--green)}
.stat.warn .stat-val{color:var(--amber)}
.stat.danger .stat-val{color:var(--red)}

/* ── Alert ── */
.alert{display:flex;align-items:flex-start;gap:8px;padding:10px 13px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:8px;border:1px solid}
.alert.ok{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.alert.warn{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.alert.danger{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.alert.info{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}

/* ── Form ── */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.full{grid-column:1/-1}
.fg.third{grid-column:span 1}
.flbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.req{color:var(--red)}
.fi{padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;outline:none;width:100%}
.fi:focus{border-color:var(--green)}
textarea.fi{resize:vertical;min-height:64px;line-height:1.5}
.faction{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}

/* ── Search row ── */
.srow{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.sinput{flex:1;min-width:160px;padding:7px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;outline:none}
.sinput:focus{border-color:var(--green)}
select.sinput{cursor:pointer}
.count-lbl{font-size:11.5px;color:var(--muted);margin-bottom:10px}

/* ── Machine cards on dashboard ── */
.machine-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:18px}
.machine-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:border-color .15s}
.machine-card:hover{border-color:var(--green)}
.mc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mc-name{font-size:14px;font-weight:600}
.mc-body{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:5px}
.mc-row{display:flex;align-items:center;justify-content:space-between}
.mc-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--text);font-weight:500}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);max-width:540px;width:100%;max-height:88vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--border)}
.modal-title{font-size:14px;font-weight:600}
.modal-body{padding:16px 18px}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ── Print styles ── */
@media print{
  .no-print{display:none!important}
  .sidebar{display:none!important}
  .topbar{display:none!important}
  .app{display:block;height:auto}
  .main{display:block;height:auto;overflow:visible}
  .content{display:block;overflow:visible;padding:0}
  .view{display:block!important}
  .modal-bg{display:none!important}
  body{background:#fff;color:#000;font-size:11pt}
  .card{border:1px solid #ccc;page-break-inside:avoid;margin-bottom:16pt}
  table{page-break-inside:auto}
  tr{page-break-inside:avoid}
  th,td{padding:5pt 8pt;font-size:10pt}
  .print-header{display:block!important;margin-bottom:18pt}
  .bdg{border:1px solid #ccc;background:#f5f5f5;color:#000}
  .stats{grid-template-columns:repeat(4,1fr)}
  .stat{border:1px solid #ccc}
}
.print-header{display:none}
.print-header h1{font-size:16pt;font-weight:700;margin-bottom:4pt}
.print-header p{font-size:10pt;color:#555;margin-bottom:2pt}
.print-header .print-line{border-bottom:1px solid #000;margin:8pt 0}

/* ── Mobile ── */
.hamburger{display:none}
.bottom-nav{display:none}

@media(max-width:700px){
  .app{flex-direction:column}
  .sidebar{display:none}
  .hamburger{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border:none;background:none;cursor:pointer;color:var(--text);border-radius:var(--radius-sm)}
  .hamburger svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2}
  .content{padding:12px 14px 80px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .fgrid{grid-template-columns:1fr}
  .fg.full{grid-column:1}
  .card{overflow-x:auto}
  table{min-width:560px}
  .srow{flex-wrap:wrap}
  .modal-bg{padding:0;align-items:flex-end}
  .modal{border-radius:var(--radius) var(--radius) 0 0;max-height:92vh;width:100%}
  .machine-grid{grid-template-columns:1fr}
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:100;padding:6px 0 env(safe-area-inset-bottom,6px)}
  .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;cursor:pointer;font-size:9px;font-weight:500;color:var(--muted);border:none;background:none;font-family:inherit;-webkit-tap-highlight-color:transparent}
  .bn-item.active{color:var(--green)}
  .bn-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5}
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
  .drawer-overlay.open{opacity:1;pointer-events:all}
  .drawer{position:fixed;top:0;left:0;bottom:0;width:72vw;max-width:280px;background:var(--surface);z-index:201;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow-y:auto;box-shadow:4px 0 24px rgba(0,0,0,.18)}
  .drawer.open{transform:translateX(0)}
}
</style>
</head>

<script>
// ── MACHINES ──────────────────────────────────────────────
const MACHINES = [
  { id:'cfm3500',    name:'CFM 3500',       type:'Encapsulator' },
  { id:'cfm2000',    name:'CFM 2000',       type:'Encapsulator' },
  { id:'vblender',   name:'V Blender',      type:'Blender' },
  { id:'compressor', name:'Compressor',     type:'Utility' },
  { id:'kapscapper', name:'Kaps-all Capper',type:'Capper' },
  { id:'kgk1',       name:'KGK Inkjet #1',  type:'Coding / Marking' },
  { id:'kgk2',       name:'KGK Inkjet #2',  type:'Coding / Marking' },
];

const MAINTENANCE_TYPES = [
  'Routine / Preventive',
  'Cleaning',
  'Lubrication',
  'Calibration',
  'Part replacement',
  'Repair',
  'Inspection',
  'Validation / Qualification',
  'Other',
];

// ── STATE ─────────────────────────────────────────────────
let records = [];
let curView = 'dashboard';
let filterMachine = 'All', filterType = 'All', filterS = '';

// ── STORAGE ───────────────────────────────────────────────
function save() {
  try { localStorage.setItem('maint_records', JSON.stringify(records)); } catch(e) {}
}
function load() {
  try {
    var d = localStorage.getItem('maint_records');
    records = d ? JSON.parse(d) : [];
  } catch(e) { records = []; }
}

// ── HELPERS ───────────────────────────────────────────────
function gid() { return 'MR-' + Date.now().toString(36).toUpperCase(); }
function today() { return new Date().toISOString().split('T')[0]; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
  catch(e) { return d; }
}
function machineById(id) { return MACHINES.find(function(m){return m.id===id;}) || {name:id,type:''}; }
function daysSince(d) {
  if (!d) return null;
  var v = Math.floor((new Date() - new Date(d+'T00:00:00')) / 86400000);
  return isNaN(v) ? null : v;
}
function dueBadge(d) {
  var n = daysSince(d);
  if (n === null) return '<span class="bdg neutral">No records</span>';
  if (n <= 30) return '<span class="bdg ok">'+n+'d ago</span>';
  if (n <= 90) return '<span class="bdg warn">'+n+'d ago</span>';
  return '<span class="bdg danger">'+n+'d ago</span>';
}

// ── RENDER HELPERS ────────────────────────────────────────
function recordsForMachine(machineId) {
  return records.filter(function(r){ return r.machineId === machineId; })
                .sort(function(a,b){ return b.date.localeCompare(a.date); });
}

function machineTableRows(recs) {
  if (!recs.length) return '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:24px">No maintenance records yet. <button class="btn sm" onclick="setView(\'addlog\')" style="margin-left:8px">+ Log first entry</button></td></tr>';
  return recs.map(function(r) {
    return '<tr>'
      + '<td class="mono" style="color:var(--muted);font-size:11px">'+esc(r.id)+'</td>'
      + '<td><strong>'+fmtDate(r.date)+'</strong></td>'
      + '<td><span class="bdg neutral">'+esc(r.type)+'</span></td>'
      + '<td style="max-width:200px">'+esc(r.notes||'—')+'</td>'
      + '<td>'+esc(r.performedBy)+'</td>'
      + '<td style="min-width:160px">'
          + (r.signedOff
            ? '<span class="bdg ok">✓ '+esc(r.signedOff)+'</span>'
            + (r.signedDate ? '<br><span style="font-size:11px;color:var(--muted)">'+fmtDate(r.signedDate)+'</span>' : '')
            : '<span class="bdg warn">Pending sign-off</span>')
      + '</td>'
      + '<td style="white-space:nowrap">'
          + (r.signedOff ? '' : '<button class="btn xs pri" onclick="openSignoff(\''+r.id+'\')">Sign off</button>&nbsp;')
          + '<button class="btn xs" onclick="openEdit(\''+r.id+'\')">Edit</button>&nbsp;'
          + '<button class="btn xs danger" onclick="deleteRecord(\''+r.id+'\')">Del</button>'
      + '</td>'
      + '</tr>';
  }).join('');
}

function printTable(recs) {
  if (!recs.length) return '<p style="color:#666;padding:8pt 0">No records.</p>';
  return '<table style="width:100%;border-collapse:collapse;font-size:10pt">'
    + '<thead><tr>'
    + '<th style="border:1px solid #ccc;padding:5pt 8pt;background:#f5f5f5">ID</th>'
    + '<th style="border:1px solid #ccc;padding:5pt 8pt;background:#f5f5f5">Date Performed</th>'
    + '<th style="border:1px solid #ccc;padding:5pt 8pt;background:#f5f5f5">Type</th>'
    + '<th style="border:1px solid #ccc;padding:5pt 8pt;background:#f5f5f5">Performed By</th>'
    + '<th style="border:1px solid #ccc;padding:5pt 8pt;background:#f5f5f5">Notes</th>'
    + '<th style="border:1px solid #ccc;padding:5pt 8pt;background:#f5f5f5">Signed Off By</th>'
    + '<th style="border:1px solid #ccc;padding:5pt 8pt;background:#f5f5f5">Sign-off Date</th>'
    + '</tr></thead><tbody>'
    + recs.map(function(r){
        return '<tr>'
          + '<td style="border:1px solid #ccc;padding:5pt 8pt;font-family:monospace;font-size:9pt">'+esc(r.id)+'</td>'
          + '<td style="border:1px solid #ccc;padding:5pt 8pt">'+fmtDate(r.date)+'</td>'
          + '<td style="border:1px solid #ccc;padding:5pt 8pt">'+esc(r.type)+'</td>'
          + '<td style="border:1px solid #ccc;padding:5pt 8pt">'+esc(r.performedBy)+'</td>'
          + '<td style="border:1px solid #ccc;padding:5pt 8pt">'+esc(r.notes||'')+'</td>'
          + '<td style="border:1px solid #ccc;padding:5pt 8pt">'+esc(r.signedOff||'')+'</td>'
          + '<td style="border:1px solid #ccc;padding:5pt 8pt">'+fmtDate(r.signedDate)+'</td>'
          + '</tr>';
      }).join('')
    + '</tbody></table>';

// ── VIEW: DASHBOARD ───────────────────────────────────────
function renderDashboard() {
  var unsigned = records.filter(function(r){ return !r.signedOff; }).length;
  var total = records.length;
  var last30 = records.filter(function(r){ var d=daysSince(r.date); return d!==null&&d<=30; }).length;
  var overdue = MACHINES.filter(function(m){
    var recs = recordsForMachine(m.id);
    if (!recs.length) return false;
    var d = daysSince(recs[0].date);
    return d !== null && d > 90;
  }).length;

  var html = '<div class="stats">'
    + '<div class="stat ok"><div class="stat-lbl">Total records</div><div class="stat-val">'+total+'</div></div>'
    + '<div class="stat"><div class="stat-lbl">Last 30 days</div><div class="stat-val">'+last30+'</div></div>'
    + '<div class="stat '+(unsigned?'warn':'ok')+'"><div class="stat-lbl">Pending sign-off</div><div class="stat-val">'+unsigned+'</div></div>'
    + '<div class="stat '+(overdue?'danger':'ok')+'"><div class="stat-lbl">Overdue (&gt;90d)</div><div class="stat-val">'+overdue+'</div></div>'
    + '</div>';

  if (unsigned > 0) {
    html += '<div class="alert warn" style="margin-bottom:14px"><strong>'+unsigned+' record'+( unsigned!==1?'s':'')+' pending sign-off.</strong> Review and sign off before your next cGMP inspection.</div>';
  }

  html += '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px">Equipment status</div>';
  html += '<div class="machine-grid">';
  MACHINES.forEach(function(m) {
    var recs = recordsForMachine(m.id);
    var last = recs[0] || null;
    var unsigned_m = recs.filter(function(r){ return !r.signedOff; }).length;
    html += '<div class="machine-card" onclick="setView(\'m-'+m.id+'\')">'
      + '<div class="mc-header"><div class="mc-name">'+esc(m.name)+'</div>'
      + (unsigned_m > 0 ? '<span class="bdg warn">'+unsigned_m+' unsigned</span>' : '<span class="bdg neutral">'+esc(m.type)+'</span>')
      + '</div>'
      + '<div class="mc-body">'
      + '<div class="mc-row"><span>Last service</span>'
      + (last ? '<span class="mc-val">'+fmtDate(last.date)+'</span>' : '<span style="color:var(--hint)">Never</span>')
      + '</div>'
      + '<div class="mc-row"><span>Since last service</span>'+dueBadge(last?last.date:null)+'</div>'
      + '<div class="mc-row"><span>Total records</span><span class="mc-val">'+recs.length+'</span></div>'
      + '</div></div>';
  });
  html += '</div>';

  // Recent activity
  var recent = records.slice().sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,8);
  html += '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px">Recent activity</div>';
  html += '<div class="card" style="overflow-x:auto"><table><thead><tr><th>Date</th><th>Machine</th><th>Type</th><th>Performed by</th><th>Sign-off</th></tr></thead><tbody>';
  if (!recent.length) {
    html += '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:20px">No records yet — <button class="btn sm" onclick="setView(\'addlog\')" style="margin-left:6px">Log first entry</button></td></tr>';
  } else {
    recent.forEach(function(r) {
      html += '<tr>'
        + '<td>'+fmtDate(r.date)+'</td>'
        + '<td><strong>'+esc(machineById(r.machineId).name)+'</strong></td>'
        + '<td><span class="bdg neutral">'+esc(r.type)+'</span></td>'
        + '<td>'+esc(r.performedBy)+'</td>'
        + '<td>'+(r.signedOff ? '<span class="bdg ok">✓ '+esc(r.signedOff)+'</span>' : '<span class="bdg warn">Pending</span>')+'</td>'
        + '</tr>';
    });
  }
  html += '</tbody></table></div>';
  return html;
}

// ── VIEW: ALL RECORDS ─────────────────────────────────────
function renderAllLog() {
  var machines = ['All'].concat(MACHINES.map(function(m){return m.name;}));
  var types = ['All'].concat(MAINTENANCE_TYPES);
  var rows = records.slice().sort(function(a,b){return b.date.localeCompare(a.date);});

  if (filterMachine !== 'All') rows = rows.filter(function(r){ return machineById(r.machineId).name === filterMachine; });
  if (filterType !== 'All') rows = rows.filter(function(r){ return r.type === filterType; });
  if (filterS) {
    var s = filterS.toLowerCase();
    rows = rows.filter(function(r){
      return (r.notes||'').toLowerCase().includes(s)
        || r.performedBy.toLowerCase().includes(s)
        || (r.signedOff||'').toLowerCase().includes(s)
        || machineById(r.machineId).name.toLowerCase().includes(s);
    });
  }

  return '<div class="srow">'
    + '<input id="all-s" class="sinput" type="text" placeholder="Search…" value="'+esc(filterS)+'">'
    + '<select id="all-m" class="sinput" style="max-width:170px">'+machines.map(function(m){return '<option'+(m===filterMachine?' selected':'')+'>'+esc(m)+'</option>';}).join('')+'</select>'
    + '<select id="all-t" class="sinput" style="max-width:185px">'+types.map(function(t){return '<option'+(t===filterType?' selected':'')+'>'+esc(t)+'</option>';}).join('')+'</select>'
    + '<button class="btn sm" onclick="exportCSV()">Export CSV</button>'
    + '</div>'
    + '<div class="count-lbl">'+rows.length+' record'+(rows.length!==1?'s':'')+' shown</div>'
    + '<div class="card" style="overflow-x:auto"><table><thead><tr><th>ID</th><th>Date</th><th>Machine</th><th>Type</th><th>Notes</th><th>Performed by</th><th>Sign-off</th><th>Actions</th></tr></thead>'
    + '<tbody>'+(rows.length===0?'<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:24px">No records match</td></tr>':
      rows.map(function(r){
        return '<tr>'
          +'<td class="mono" style="color:var(--muted);font-size:11px">'+esc(r.id)+'</td>'
          +'<td>'+fmtDate(r.date)+'</td>'
          +'<td><strong>'+esc(machineById(r.machineId).name)+'</strong></td>'
          +'<td><span class="bdg neutral">'+esc(r.type)+'</span></td>'
          +'<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.notes||'—')+'</td>'
          +'<td>'+esc(r.performedBy)+'</td>'
          +'<td>'+(r.signedOff?'<span class="bdg ok">✓ '+esc(r.signedOff)+'</span>':'<span class="bdg warn">Pending</span>')+'</td>'
          +'<td style="white-space:nowrap">'
            +(r.signedOff?'':'<button class="btn xs pri" onclick="openSignoff(\''+r.id+'\')">Sign off</button>&nbsp;')
            +'<button class="btn xs" onclick="openEdit(\''+r.id+'\')">Edit</button>&nbsp;'
            +'<button class="btn xs danger" onclick="deleteRecord(\''+r.id+'\')">Del</button>'
          +'</td></tr>';
      }).join(''))
    + '</tbody></table></div>';
}

// ── ACTIONS ───────────────────────────────────────────────
function submitLog() {
  var machineId = document.getElementById('a-machine').value;
  var date      = document.getElementById('a-date').value;
  var type      = document.getElementById('a-type').value;
  var by        = document.getElementById('a-by').value.trim();
  var notes     = document.getElementById('a-notes').value.trim();
  var signedBy  = document.getElementById('a-signedby').value.trim();
  var signedDate= document.getElementById('a-signeddate').value;
  if (!machineId||!date||!type||!by) { alert('Please fill in all required (*) fields.'); return; }
  records.unshift({
    id: gid(), machineId, date, type, performedBy: by,
    notes: notes || '',
    signedOff: signedBy || null,
    signedDate: signedDate || null,
    created: new Date().toISOString()
  });
  save();
  setView('m-'+machineId);
}

function openAddForMachine(machineId) {
  setView('addlog', machineId);
}

function openSignoff(id) {
  var r = records.find(function(x){return x.id===id;});
  if (!r) return;
  document.getElementById('modal-inner').innerHTML = '<div class="modal-header">'
    + '<div class="modal-title">Sign off — '+esc(r.id)+'</div>'
    + '<button class="btn xs" onclick="closeModal()">✕</button></div>'
    + '<div class="modal-body">'
    + '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px;font-size:13px;margin-bottom:14px">'
    + '<strong>'+esc(machineById(r.machineId).name)+'</strong> — '+fmtDate(r.date)+'<br>'
    + '<span style="color:var(--muted)">'+esc(r.type)+'</span>'
    + (r.notes ? '<br><span style="color:var(--muted);font-size:12px">'+esc(r.notes)+'</span>' : '')
    + '</div>'
    + '<div class="fgrid" style="gap:10px">'
    + '<div class="fg"><label class="flbl">Signed off by <span class="req">*</span></label><input class="fi" id="so-by" placeholder="Supervisor name or ID"></div>'
    + '<div class="fg"><label class="flbl">Date <span class="req">*</span></label><input class="fi" id="so-date" type="date" value="'+today()+'"></div>'
    + '</div></div>'
    + '<div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button>'
    + '<button class="btn pri" onclick="submitSignoff(\''+id+'\')">Confirm sign-off</button></div>';
  document.getElementById('modal-bg').style.display = 'flex';
}

function submitSignoff(id) {
  var by   = document.getElementById('so-by').value.trim();
  var date = document.getElementById('so-date').value;
  if (!by||!date) { alert('Both fields required.'); return; }
  var r = records.find(function(x){return x.id===id;});
  if (!r) return;
  r.signedOff  = by;
  r.signedDate = date;
  save();
  closeModal();
  renderView(curView);
}

function openEdit(id) {
  var r = records.find(function(x){return x.id===id;});
  if (!r) return;
  document.getElementById('modal-inner').innerHTML = '<div class="modal-header">'
    + '<div class="modal-title">Edit record — '+esc(r.id)+'</div>'
    + '<button class="btn xs" onclick="closeModal()">✕</button></div>'
    + '<div class="modal-body"><div class="fgrid" style="gap:10px">'
    + '<div class="fg"><label class="flbl">Date</label><input class="fi" id="e-date" type="date" value="'+esc(r.date)+'"></div>'
    + '<div class="fg"><label class="flbl">Type</label><select class="fi" id="e-type">'+MAINTENANCE_TYPES.map(function(t){return '<option'+(t===r.type?' selected':'')+'>'+t+'</option>';}).join('')+'</select></div>'
    + '<div class="fg full"><label class="flbl">Performed by</label><input class="fi" id="e-by" value="'+esc(r.performedBy)+'"></div>'
    + '<div class="fg full"><label class="flbl">Notes</label><textarea class="fi" id="e-notes">'+esc(r.notes||'')+'</textarea></div>'
    + '</div></div>'
    + '<div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button>'
    + '<button class="btn pri" onclick="saveEdit(\''+id+'\')">Save</button></div>';
  document.getElementById('modal-bg').style.display = 'flex';
}

function saveEdit(id) {
  var r = records.find(function(x){return x.id===id;});
  if (!r) return;
  r.date = document.getElementById('e-date').value || r.date;
  r.type = document.getElementById('e-type').value;
  r.performedBy = document.getElementById('e-by').value.trim() || r.performedBy;
  r.notes = document.getElementById('e-notes').value.trim();
  save();
  closeModal();
  renderView(curView);
}

function deleteRecord(id) {
  if (!confirm('Delete this maintenance record? This cannot be undone.')) return;
  records = records.filter(function(r){return r.id!==id;});
  save();
  renderView(curView);
}

function closeModal() {
  document.getElementById('modal-bg').style.display = 'none';
}

// ── EXPORT ────────────────────────────────────────────────
function buildCSV(recs) {
  var headers = ['Record ID','Machine','Date','Type','Performed By','Notes','Signed Off By','Sign-off Date'];
  var rows = recs.map(function(r){
    return [r.id, machineById(r.machineId).name, r.date, r.type, r.performedBy, r.notes||'', r.signedOff||'', r.signedDate||'']
      .map(function(v){return '"'+(String(v).replace(/"/g,'""'))+'"';}).join(',');
  });
  return [headers.join(',')].concat(rows).join('\n');
}
function exportCSV() {
  var recs = records.slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  var blob = new Blob([buildCSV(recs)], {type:'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'maintenance_log_'+today()+'.csv';
  a.click();
}
function exportMachineCSV(machineId) {
  var recs = recordsForMachine(machineId);
  var blob = new Blob([buildCSV(recs)], {type:'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'maintenance_'+machineId+'_'+today()+'.csv';
  a.click();
}

// ── PRINT ─────────────────────────────────────────────────
function printView() {
  var ph = document.getElementById('print-header');
  var phM = document.getElementById('ph-machine');
  var phD = document.getElementById('ph-date');
  ph.style.display = 'block';
  phD.textContent = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  if (curView === 'dashboard') {
    phM.textContent = 'All Equipment — Summary Report';
    // Replace content temporarily with print-optimized version
    var content = document.querySelector('.content');
    var orig = content.innerHTML;
    var printHTML = '<div class="print-header" style="display:block!important">'
      + '<h1>Equipment Maintenance Log — All Machines</h1>'
      + '<p>Generated: '+phD.textContent+'</p>'
      + '<p>Facility: _____________________________________ &nbsp;&nbsp; SOP Ref: _____________________</p>'
      + '<div style="border-bottom:1px solid #000;margin:8pt 0"></div></div>';

    MACHINES.forEach(function(m) {
      var recs = recordsForMachine(m.id);
      var last = recs[0];
      printHTML += '<h3 style="margin:14pt 0 6pt;font-size:12pt">'+m.name+' <span style="font-weight:400;font-size:10pt;color:#666">('+m.type+')</span></h3>';
      printHTML += printTable(recs);
    });
    content.innerHTML = printHTML;
    window.print();
    content.innerHTML = orig;
    bindFilters();
    return;
  }

  if (curView.startsWith('m-')) {
    var machineId = curView.replace('m-','');
    var m = machineById(machineId);
    phM.textContent = 'Machine: '+m.name+' ('+m.type+')';
    var recs = recordsForMachine(machineId);
    var content2 = document.querySelector('.content');
    var orig2 = content2.innerHTML;
    content2.innerHTML = '<div style="display:block">'
      + '<h1 style="font-size:15pt;margin-bottom:4pt">'+m.name+' — Maintenance Log</h1>'
      + '<p style="font-size:10pt;margin-bottom:3pt">Type: '+m.type+' | Generated: '+phD.textContent+'</p>'
      + '<p style="font-size:10pt;margin-bottom:3pt">Facility: _____________________________________ &nbsp;&nbsp; SOP Ref: _____________________</p>'
      + '<div style="border-bottom:1px solid #000;margin:8pt 0"></div>'
      + printTable(recs)
      + '<div style="margin-top:24pt;border-top:1px solid #000;padding-top:10pt">'
      + '<p style="font-size:10pt"><strong>QA / Supervisor sign-off:</strong> ___________________________ &nbsp;&nbsp; Date: _______________</p>'
      + '</div></div>';
    window.print();
    content2.innerHTML = orig2;
    return;
  }

  if (curView === 'alllog') {
    phM.textContent = 'All Equipment — Full Log';
    var recs3 = records.slice().sort(function(a,b){return b.date.localeCompare(a.date);});
    var content3 = document.querySelector('.content');
    var orig3 = content3.innerHTML;
    content3.innerHTML = '<h1 style="font-size:15pt;margin-bottom:4pt">Equipment Maintenance Log — All Records</h1>'
      + '<p style="font-size:10pt;margin-bottom:3pt">Generated: '+phD.textContent+' | Total records: '+recs3.length+'</p>'
      + '<p style="font-size:10pt;margin-bottom:3pt">Facility: _____________________________________ &nbsp;&nbsp; SOP Ref: _____________________</p>'
      + '<div style="border-bottom:1px solid #000;margin:8pt 0"></div>'
      + printTable(recs3);
    window.print();
    content3.innerHTML = orig3;
    bindFilters();
    return;
  }

  window.print();
}

// ── NAVIGATION ────────────────────────────────────────────
var VIEW_TITLES = {
  dashboard:'Dashboard', alllog:'All records', addlog:'Log maintenance',
  'm-cfm3500':'CFM 3500','m-cfm2000':'CFM 2000','m-vblender':'V Blender',
  'm-compressor':'Compressor','m-kapscapper':'Kaps-all Capper',
  'm-kgk1':'KGK Inkjet #1','m-kgk2':'KGK Inkjet #2'
};

function setView(v, extra) {
  curView = v;
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.nav-item, .bn-item').forEach(function(el){el.classList.remove('active');});
  var viewEl = document.getElementById('view-'+v);
  if (viewEl) viewEl.classList.add('active');
  document.querySelectorAll('[data-view="'+v+'"]').forEach(function(el){el.classList.add('active');});
  document.getElementById('topbar-title').textContent = VIEW_TITLES[v] || v;
  renderView(v, extra);
}

function renderView(v, extra) {
  var el = document.getElementById('view-'+v);
  if (!el) return;
  if (v==='dashboard') el.innerHTML = renderDashboard();
  else if (v==='alllog') { el.innerHTML = renderAllLog(); bindFilters(); }
  else if (v==='addlog') el.innerHTML = renderAddLog(extra||'');
  else if (v.startsWith('m-')) el.innerHTML = renderMachinePage(v.replace('m-',''));
}

function bindFilters() {
  var s = document.getElementById('all-s');
  var m = document.getElementById('all-m');
  var t = document.getElementById('all-t');
  if (s) s.addEventListener('input', function(e){filterS=e.target.value; renderView('alllog');});
  if (m) m.addEventListener('change', function(e){filterMachine=e.target.value; renderView('alllog');});
  if (t) t.addEventListener('change', function(e){filterType=e.target.value; renderView('alllog');});
}

// ── MOBILE / DRAWER ───────────────────────────────────────
function openDrawer() {
  var d = document.getElementById('drawer');
  var o = document.getElementById('drawer-overlay');
  if (d) d.classList.add('open');
  if (o) { o.classList.add('open'); o.style.pointerEvents='all'; o.style.opacity='.45'; }
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  var d = document.getElementById('drawer');
  var o = document.getElementById('drawer-overlay');
  if (d) d.classList.remove('open');
  if (o) { o.classList.remove('open'); o.style.pointerEvents='none'; o.style.opacity='0'; }
  document.body.style.overflow = '';
}

// ── BOOT ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  load();
  setView('dashboard');

  // Desktop nav
  var navEl = document.getElementById('nav');
  if (navEl) navEl.addEventListener('click', function(e){
    var item = e.target.closest('.nav-item');
    if (item && item.dataset.view) setView(item.dataset.view);
  });

  // Bottom nav
  var bnEl = document.getElementById('bottom-nav');
  if (bnEl) bnEl.addEventListener('click', function(e){
    var item = e.target.closest('.bn-item');
    if (item && item.dataset.view) setView(item.dataset.view);
  });

  // Drawer nav
  var dnEl = document.getElementById('drawer-nav');
  if (dnEl) dnEl.addEventListener('click', function(e){
    var item = e.target.closest('.nav-item');
    if (item && item.dataset.view) { setView(item.dataset.view); closeDrawer(); }
  });

  // Hamburger
  var hb = document.getElementById('hamburger-btn');
  if (hb) hb.addEventListener('click', openDrawer);

  // Drawer overlay
  var ov = document.getElementById('drawer-overlay');
  if (ov) ov.addEventListener('click', closeDrawer);

  // Swipe to close drawer
  var dr = document.getElementById('drawer');
  if (dr) {
    var sx = null;
    dr.addEventListener('touchstart', function(e){ sx = e.touches[0].clientX; }, {passive:true});
    dr.addEventListener('touchmove', function(e){
      if (sx===null) return;
      if (e.touches[0].clientX - sx < -40) { closeDrawer(); sx = null; }
    }, {passive:true});
  }
});
</script>
